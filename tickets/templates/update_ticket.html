{% extends 'base.html' %}

{% block content %}
<div class="container animate-up mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="text-center mb-4">
                <span class="badge bg-primary-subtle text-primary rounded-pill px-3 mb-2">Ticket #{{ ticket.id }}</span>
                <h2 class="fw-bold text-dark">Update Support Request</h2>
                <p class="text-muted">You can only modify this request while its status is <strong>Pending</strong>.</p>
            </div>
            
            <div class="card border-0 shadow-lg rounded-4 p-4 overflow-hidden">
                <div class="position-absolute top-0 start-0 w-100" style="height: 4px; background: var(--primary-gradient);"></div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-tag me-2"></i>Subject</label>
                        <input type="text" name="title" class="form-control rounded-3 py-2" value="{{ ticket.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-exclamation-circle me-2"></i>Urgency Level</label>
                        <select name="priority" class="form-select rounded-3 py-2" required>
                            <option value="Low" {% if ticket.priority == 'Low' %}selected{% endif %}>Low - General Inquiry</option>
                            <option value="Medium" {% if ticket.priority == 'Medium' %}selected{% endif %}>Medium - Standard Support</option>
                            <option value="High" {% if ticket.priority == 'High' %}selected{% endif %}>High - Urgent Issue</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-justify-left me-2"></i>Detailed Description</label>
                        <textarea name="description" class="form-control rounded-3" rows="6" required>{{ ticket.description }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i>Update Ticket
                        </button>
                        <a href="{% url 'my_tickets' %}" class="btn btn-light rounded-pill py-2 text-muted">
                            Cancel and Go Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
