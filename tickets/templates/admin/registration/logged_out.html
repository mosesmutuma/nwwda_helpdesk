{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWWDA | Session Ended</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-purple: #764ba2;
            --primary-blue: #667eea;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0c29;
            overflow: hidden;
        }

        .bg-overlay {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(19, 33, 54, 0.5)), 
                              url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1950');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px;
            color: white;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }

        .brand-logo {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: white;
            padding: 5px;
            margin-bottom: 25px;
        }

        .btn-relogin {
            background: linear-gradient(90deg, var(--primary-purple), var(--primary-blue));
            border: none; border-radius: 12px;
            padding: 14px 30px; font-weight: 700; color: white;
            text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="bg-overlay">
    <div class="logout-glass">
        <img src="{% static 'images/logo.jpg' %}" alt="NWWDA" class="brand-logo">
        <h2 class="fw-bold mb-3">Logged Out</h2>
        <p class="mb-4">You have been successfully logged out of the NWWDA Secure Gateway. For your security, please close this tab.</p>
        
        <a href="{% url 'login' %}" class="btn-relogin">
            Log In Again <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </div>
</div>

</body>
</html>
