{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWWDA | Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body, html {
            height: 100%; margin: 0; font-family: 'Inter', sans-serif;
            background: #0f0c29;
        }
        .bg-overlay {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(19, 33, 54, 0.4)), 
                              url('https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1920');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-glass {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px;
            padding: 40px; color: white; width: 100%; max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .brand-logo { width: 70px; height: 70px; border-radius: 50%; background: white; padding: 5px; margin-bottom: 20px; }
        .form-control {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; color: white; padding: 12px;
        }
        .btn-authorize {
            background: linear-gradient(90deg, #764ba2, #667eea);
            border: none; border-radius: 12px; padding: 14px; font-weight: 700; color: white;
            text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px; width: 100%;
        }
    </style>
</head>
<body>

<div class="bg-overlay">
    <div class="login-glass text-center">
        <img src="{% static 'images/logo.jpg' %}" alt="NWWDA" class="brand-logo">
        <h3 class="fw-bold">Password Recovery</h3>
        <p class="small mb-4">Enter your admin email to receive reset instructions.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4 text-start">
                <label class="form-label small text-uppercase fw-bold">Email Address</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="text-danger small mt-2">{{ form.email.errors }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-authorize">Send Reset Link</button>
            <div class="mt-3">
                <a href="{% url 'admin:login' %}" class="text-white-50 small text-decoration-none">Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    // This small script ensures the Django form input gets the Bootstrap class
    document.querySelector('#id_email').classList.add('form-control');
    document.querySelector('#id_email').placeholder = 'e.g. admin@nwwda.go.ke';
</script>

</body>
</html>
